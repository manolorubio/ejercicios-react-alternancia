
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reservas Rurales – Granada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f0f8ff; }
    .card { margin-bottom: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4 text-center text-primary">Reservas Rurales – Granada</h1>

    <div class="card">
      <div class="card-header">Crear Reserva</div>
      <div class="card-body">
        <form id="reservaForm">
          <div class="form-group">
            <label>Nombre del Cliente</label>
            <input type="text" id="cliente" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Fecha de Entrada</label>
            <input type="date" id="fechaEntrada" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Fecha de Salida</label>
            <input type="date" id="fechaSalida" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Tipo de Reserva</label>
            <select id="tipoReserva" class="form-control">
              <option value="normal">Normal</option>
              <option value="premium">Premium</option>
              <option value="desayuno">Con Desayuno</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tarifa</label>
            <input type="number" id="tarifa" class="form-control" step="0.01" required>
          </div>
          <div class="form-group hidden" id="tarifaExtraGroup">
            <label>Tarifa Extra (Premium o Desayuno)</label>
            <input type="number" id="tarifaExtra" class="form-control" step="0.01">
          </div>
          <button class="btn btn-success" type="submit">Crear Reserva</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Reservas Creadas</div>
      <ul id="listaReservas" class="list-group list-group-flush"></ul>
    </div>
  </div>

  <script>
    class Reserva {
      #cliente;
      #fechaEntrada;
      #fechaSalida;

      constructor(cliente, fechaEntrada, fechaSalida) {
        this.#cliente = cliente;
        this.#fechaEntrada = new Date(fechaEntrada);
        this.#fechaSalida = new Date(fechaSalida);
      }

      get cliente() { return this.#cliente; }
      set cliente(valor) { this.#cliente = valor; }

      calcularNoches() {
        const msPorNoche = 1000 * 60 * 60 * 24;
        return Math.round((this.#fechaSalida - this.#fechaEntrada) / msPorNoche);
      }
    }

    class ReservaPremium extends Reserva {
      constructor(cliente, fechaEntrada, fechaSalida, tarifaPremium) {
        super(cliente, fechaEntrada, fechaSalida);
        this.tarifaPremium = tarifaPremium;
      }

      calcularPrecioTotal() {
        return this.calcularNoches() * this.tarifaPremium;
      }
    }

    Object.freeze(ReservaPremium); // Simula final

    class ReservaConDesayuno extends Reserva {
      constructor(cliente, fechaEntrada, fechaSalida, tarifaBase, tarifaDesayuno) {
        super(cliente, fechaEntrada, fechaSalida);
        this.tarifaBase = tarifaBase;
        this.tarifaDesayuno = tarifaDesayuno;
      }

      calcularPrecioTotal() {
        return this.calcularNoches() * (this.tarifaBase + this.tarifaDesayuno);
      }
    }

    const reservaForm = document.getElementById('reservaForm');
    const tipoReserva = document.getElementById('tipoReserva');
    const tarifaExtraGroup = document.getElementById('tarifaExtraGroup');
    const listaReservas = document.getElementById('listaReservas');

    tipoReserva.addEventListener('change', () => {
      tarifaExtraGroup.classList.toggle('hidden', tipoReserva.value === 'normal');
    });

    reservaForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const cliente = document.getElementById('cliente').value;
      const fechaEntrada = document.getElementById('fechaEntrada').value;
      const fechaSalida = document.getElementById('fechaSalida').value;
      const tipo = tipoReserva.value;
      const tarifa = parseFloat(document.getElementById('tarifa').value);
      const tarifaExtra = parseFloat(document.getElementById('tarifaExtra').value) || 0;

      let reserva;

      if (tipo === 'premium') {
        reserva = new ReservaPremium(cliente, fechaEntrada, fechaSalida, tarifa + tarifaExtra);
      } else if (tipo === 'desayuno') {
        reserva = new ReservaConDesayuno(cliente, fechaEntrada, fechaSalida, tarifa, tarifaExtra);
      } else {
        reserva = new Reserva(cliente, fechaEntrada, fechaSalida);
        reserva.calcularPrecioTotal = () => reserva.calcularNoches() * tarifa;
      }

      const li = document.createElement('li');
      li.className = 'list-group-item';
      li.textContent = `Cliente: ${reserva.cliente}, Noches: ${reserva.calcularNoches()}, Total: €${reserva.calcularPrecioTotal().toFixed(2)}`;
      listaReservas.appendChild(li);
      reservaForm.reset();
      tarifaExtraGroup.classList.add('hidden');
    });
  </script>
</body>
</html>
